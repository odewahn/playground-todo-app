apiVersion: apps/v1
kind: Deployment
metadata:
  name: odewahn-todo-app-backend
  namespace: odewahn-todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odewahn-todo-app-backend
  template:
    metadata:
      labels:
        app: odewahn-todo-app-backend
    spec:
      containers:
        - name: odewahn-todo-app-backend
          image: us-central1-docker.pkg.dev/common-build/orm-hub/odewahn-todo-app-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odewahn-todo-app-db-secret
                  key: db-password
            - name: DATABASE_URL
              value: "postgres://todo_user:$(DB_PASSWORD)@odewahn-todo-app-db:5432/todo_db"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/todos
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/todos
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
