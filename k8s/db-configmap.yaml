apiVersion: v1
kind: ConfigMap
metadata:
  name: odewahn-todo-app-db-init
  namespace: odewahn-todo-app
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS todos (
      id        SERIAL PRIMARY KEY,
      title     TEXT        NOT NULL,
      completed BOOLEAN     NOT NULL DEFAULT FALSE,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
