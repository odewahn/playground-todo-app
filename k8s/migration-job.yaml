apiVersion: batch/v1
kind: Job
metadata:
  name: odewahn-todo-app-migrate
  namespace: odewahn-todo-app
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: us-central1-docker.pkg.dev/strong-keyword-184513/orm-hub/odewahn-todo-app-backend:latest
          command: ["node", "migrations/run.js"]
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odewahn-todo-app-db-secret
                  key: db-password
            - name: DATABASE_URL
              value: "postgres://todo_user:$(DB_PASSWORD)@odewahn-todo-app-db:5432/todo_db"
