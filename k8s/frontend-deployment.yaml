apiVersion: apps/v1
kind: Deployment
metadata:
  name: odewahn-todo-app-frontend
  namespace: odewahn-todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odewahn-todo-app-frontend
  template:
    metadata:
      labels:
        app: odewahn-todo-app-frontend
    spec:
      containers:
        - name: odewahn-todo-app-frontend
          image: us-central1-docker.pkg.dev/common-build/orm-hub/odewahn-todo-app-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
